name: surrogate_base
train_dataset_path: datasets/random_dataset.pkl.lz4
val_dataset_path: datasets/random_val_dataset.pkl.lz4
model:
  gnn_layers: 3
  dim: 64
  ff_dim: 128
  n_layers: 3
  n_heads: 4
  n_components: 4
  drop_rate: 0.2
  dtype: float32
optimizer:
  learning_rate: 0.0015
  weight_decay: 0.01
  b1: 0.85
  b2: 0.999
  grad_clip: 1.0
train:
  ckpt:
    intermediate: false
    freq: 4000
  log:
    type: wandb
    freq: 40
  val:
    n_steps: 400
    freq: 100
  batch_size: 16
  n_steps: 20000
  seed: 42
